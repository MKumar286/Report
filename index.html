<!DOCTYPE html>
<html>
<head>

<title>MGIT Placement Portal</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
padding:15px;
overflow-x:hidden;
color:white;
background:linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#1c1c3c);
background-size:400% 400%;
animation:bgMove 15s ease infinite;
min-height:100vh;
}

/* Animated Background */

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* Floating Glow */

body::before{
content:"";
position:fixed;
width:500px;
height:500px;
background:rgba(0,198,255,0.15);
border-radius:50%;
top:-120px;
left:-120px;
filter:blur(100px);
animation:float1 10s infinite alternate;
z-index:-1;
}

body::after{
content:"";
position:fixed;
width:400px;
height:400px;
background:rgba(255,0,150,0.15);
border-radius:50%;
bottom:-100px;
right:-100px;
filter:blur(100px);
animation:float2 12s infinite alternate;
z-index:-1;
}

@keyframes float1{
from{transform:translateY(0px);}
to{transform:translateY(80px);}
}

@keyframes float2{
from{transform:translateX(0px);}
to{transform:translateX(-80px);}
}

/* HEADER */

.header-box{
background:linear-gradient(135deg,#000814,#001d3d,#003566);
padding:6px 10px;
border-radius:18px 18px 0 0;
margin-bottom:0;
box-shadow:0 6px 20px rgba(0,0,0,0.35);
border:1px solid rgba(255,255,255,0.15);
border-bottom:none;
text-align:center;
}

/* HEADINGS */

h1{
font-size:34px;
font-weight:bold;
background:linear-gradient(90deg,#ffffff,#ffe082,#ffffff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
margin-bottom:8px;
letter-spacing:1px;
}

h3{
font-size:18px;
margin-top:2px;
font-weight:500;
background:linear-gradient(90deg,#b2ff59,#00e5ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* FILTER SECTION GENERAL */

.filter-section {
display:flex;
flex-wrap:nowrap;
gap:12px;
background:rgba(255,255,255,0.12);
padding:8px 12px;
backdrop-filter:blur(10px);
box-shadow:0 6px 20px rgba(0,0,0,0.25);
border:1px solid rgba(255,255,255,0.15);
border-top:none;
overflow-x:auto;
overflow-y:hidden;
scroll-behavior:smooth;
align-items: center;
}

/* Top dates section specific adjustments */
.date-container {
border-bottom: 1px solid rgba(255,255,255,0.08);
}

/* Bottom regular controls specific adjustments */
.controls {
border-radius:0 0 14px 14px;
margin-bottom:6px;
}

/* FILTERS */

.filter-section input,
.filter-section select{
flex:0 0 auto;
width:170px;
min-width:170px;
height:30px;
padding:4px 8px;
font-size:12px;
border-radius:8px;
border:1px solid rgba(255,255,255,0.2);
outline:none;
background:rgba(255,255,255,0.92);
transition:0.3s;
color: #222;
}

.filter-section label {
font-size: 11px;
font-weight: bold;
color: #ffe082;
white-space: nowrap;
flex: 0 0 auto;
text-transform: uppercase;
letter-spacing: 0.5px;
}

/* FOCUS */

.filter-section input:focus,
.filter-section select:focus{
transform:scale(1.02);
box-shadow:0 0 10px rgba(255,255,255,0.5);
border:1px solid #00c6ff;
}

/* FILTER SCROLLBARS */

.filter-section::-webkit-scrollbar{
height:6px;
}

.filter-section::-webkit-scrollbar-track{
background:rgba(255,255,255,0.08);
border-radius:10px;
}

.filter-section::-webkit-scrollbar-thumb{
background:linear-gradient(90deg,#00c6ff,#0072ff);
border-radius:10px;
}

/* TABLE CONTAINER */

.table-container{
width:100%;
overflow-x:auto;
overflow-y:hidden;
border-radius:18px;
box-shadow:0 8px 25px rgba(0,0,0,0.35);
scroll-behavior:smooth;
background:rgba(255,255,255,0.05);
padding-bottom:6px;
}

/* TABLE SCROLLBAR */

.table-container::-webkit-scrollbar{
height:10px;
}

.table-container::-webkit-scrollbar-track{
background:rgba(255,255,255,0.08);
border-radius:10px;
}

.table-container::-webkit-scrollbar-thumb{
background:linear-gradient(90deg,#ff512f,#dd2476);
border-radius:10px;
}

.table-container::-webkit-scrollbar-thumb:hover{
background:linear-gradient(90deg,#00c6ff,#0072ff);
}

/* TABLE */

table{
border-collapse:collapse;
min-width:1600px;
width:max-content;
background:#ffffff;
color:#222;
border-radius:18px;
overflow:hidden;
}

/* TABLE HEADER */

th{
padding:8px 9px;
font-size:13px;
font-weight:bold;
text-align:center;
background:linear-gradient(135deg,#141e30,#243b55);
color:#ffffff;
line-height:1.3;
border:1px solid rgba(255,255,255,0.12);
white-space:nowrap;
}

/* TABLE DATA */

td{
padding:5px 9px;
font-size:12px;
font-weight:500;
text-align:center;
white-space:nowrap;
border:1px solid rgba(16,37,66,0.12);
}

/* ROW COLORS */

tr:nth-child(even){
background:#eef5ff;
}

tr:nth-child(odd){
background:#ffffff;
}

/* HOVER */

tbody tr:hover{
background:#ffd180;
transition:0.3s;
}

/* BUTTON */

.link-btn{
background:linear-gradient(135deg,#667eea,#764ba2);
color:white;
padding:3px 8px;
border-radius:6px;
text-decoration:none;
font-size:10px;
font-weight:bold;
line-height:1.2;
display:inline-block;
transition:0.3s;
box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

.link-btn:hover{
transform:scale(1.06);
background:linear-gradient(135deg,#43cea2,#185a9d);
}

/* MOBILE */

@media(max-width:768px){

body{
padding:10px;
}

h1{
font-size:22px;
}

h3{
font-size:15px;
}

.filter-section{
padding:6px 8px;
gap:8px;
}

.filter-section input,
.filter-section select{
width:145px;
min-width:145px;
height:28px;
padding:3px 6px;
font-size:12px;
}

th{
font-size:11px;
padding:5px 6px;
}

td{
font-size:11px;
padding:4px 6px;
}

table{
min-width:1400px;
}

}

</style>

</head>

<body>

<div class="header-box">
<h1>MGIT Placement Records</h1>
<h3>Academic Year 2025 - 2026</h3>
</div>

<div class="filter-section date-container">
<label>Campus Start:</label>
<input type="date" id="campusStart">

<label>Campus End:</label>
<input type="date" id="campusEnd">

<label style="margin-left: 20px;">Result Start:</label>
<input type="date" id="resultStart">

<label>Result End:</label>
<input type="date" id="resultEnd">
</div>

<div class="filter-section controls">

<input type="text" id="search" placeholder="Search student / roll / company">

<select id="batchFilter">
<option value="">All Batches</option>
</select>

<select id="branchFilter">
<option value="">All Branches</option>
</select>

<select id="companyFilter">
<option value="">All Companies</option>
</select>

<select id="natureFilter">
<option value="">Nature of the Company</option>
</select>

<select id="internFilter">
<option value="">Internship Type</option>
</select>

<select id="genderFilter">
<option value="">All Genders</option>
</select>

</div>

<div class="table-container">
<table id="placementTable">
<thead></thead>
<tbody></tbody>
</table>
</div>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>

<script>

/* EXPIRED / BREAKING GOOGLE SHEET LINK */
// If your data doesn't load, update this link following File -> Share -> Publish to Web -> CSV
const csvURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vTsSEjHbgDDY4qkebT71u_FTTF3EFIQ2RHwVEkrc6oLpk0NhHEjK8rzGJHxVhb5sg/pub?gid=721834139&single=true&output=csv";

let allData=[];
let natureKey="";
let internKey="";
let campusDateKey="";
let resultDateKey="";

/* FALLBACK MOCK DATA - PREVENTS CRASH IF GOOGLE LINKS ARE BROKEN */
const fallbackData = [
  {"Roll Number":"22261A0501","Student Name":"A. Rahul","Batch":"2026","Branch":"CSE","Company Placed":"TCS","Nature of the Company":"IT Service","Internship Type":"Paid","Gender":"Male","Campus Date":"12.03.2026","Result Date":"25.04.2026","Offer Letter":"https://httpbin.org/status/200"},
  {"Roll Number":"22261A0405","Student Name":"B. Sneha","Batch":"2026","Branch":"ECE","Company Placed":"Cognizant","Nature of the Company":"Consulting","Internship Type":"Unpaid","Gender":"Female","Campus Date":"08.01.2026","Result Date":"15.02.2026","Offer Letter":"https://httpbin.org/status/200"},
  {"Roll Number":"22261A1202","Student Name":"K. Vikas","Batch":"2025","Branch":"IT","Company Placed":"Amazon","Nature of the Company":"Product","Internship Type":"Paid","Gender":"Male","Campus Date":"20-04-2025","Result Date":"30-05-2025","Offer Letter":"https://httpbin.org/status/200"}
];

/* PARSE IMPLEMENTATION WITH DYNAMIC LIVE FALLBACKS */
Papa.parse(csvURL,{
  download:true,
  header:true,
  skipEmptyLines:true,
  complete:function(results){
    // Filter blank rows safely
    allData = results.data.filter(
      row => Object.values(row).join("").trim() !== ""
    );

    // If Google returned page errors (HTML text instead of CSV content)
    if(allData.length === 0 || !Object.keys(allData[0]).join("").toLowerCase().includes("roll")){
      console.warn("Google Sheet link formatting mismatch or locked file. Deploying clean structural fallback mock data.");
      loadBackupDataset("Your Google Sheet link failed to return valid data columns. Displaying sample placement rows for testing. Please re-publish your Google sheet as a CSV!");
      return;
    }

    setupSheetKeys();
  },
  error:function(err){
    console.error("Critical link fetch block: ", err);
    loadBackupDataset("Network blocking error or invalid link configuration. Displaying sample placement rows.");
  }
});

function loadBackupDataset(message) {
  alert(message);
  allData = fallbackData;
  setupSheetKeys();
}

function setupSheetKeys() {
  let headers = Object.keys(allData[0]);
  natureKey = headers.find(h => h.toLowerCase().includes("nature")) || headers[4] || "";
  internKey = headers.find(h => h.toLowerCase().includes("intern") || h.toLowerCase().includes("paid")) || headers[5] || "";
  campusDateKey = headers.find(h => h.toLowerCase().includes("campus")) || "";
  resultDateKey = headers.find(h => h.toLowerCase().includes("result")) || "";

  buildTable(allData);
  populateFilters(allData);
}

/* BUILD TABLE */
function buildTable(data){
  let thead=document.querySelector("#placementTable thead");
  let tbody=document.querySelector("#placementTable tbody");

  thead.innerHTML="";
  tbody.innerHTML="";

  if(data.length===0){
    tbody.innerHTML="<tr><td colspan='20' style='padding:20px; text-align:center; font-weight:bold;'>No Matching Records Found</td></tr>";
    return;
  }

  let headers=Object.keys(data[0]);
  let tr=document.createElement("tr");

  headers.forEach(h=>{
    let th=document.createElement("th");
    th.innerText=h;
    tr.appendChild(th);
  });
  thead.appendChild(tr);

  data.forEach(row=>{
    let tr=document.createElement("tr");
    headers.forEach(h=>{
      let td=document.createElement("td");
      let value = row[h] ? row[h].toString().trim() : "";

      if(value.toLowerCase().startsWith("http")){
        let a=document.createElement("a");
        a.href=value;
        a.target="_blank";
        a.className="link-btn";
        if(h.toLowerCase().includes("intern")){
          a.innerText="📄 Internship Letter";
        } else if(h.toLowerCase().includes("offer")){
          a.innerText="📄 Offer Letter";
        } else {
          a.innerText="📄 View";
        }
        td.appendChild(a);
      } else {
        td.innerText=value;
      }
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
}

/* POPULATE FILTERS */
function populateFilters(data){
  let getOpt = (field) => [...new Set(data.map(d=>d[field]).filter(Boolean))].sort();
  let getOptByKey = (key) => [...new Set(data.map(d=> key ? (d[key] || "").trim() : "").filter(Boolean))].sort();

  let batches = getOpt("Batch");
  let branches = getOpt("Branch");
  let companies = getOpt("Company Placed");
  let natures = getOptByKey(natureKey);
  let interns = getOptByKey(internKey);
  let genders = getOpt("Gender");

  let updateSelect = (id, options, defaultText) => {
    let el = document.getElementById(id);
    if(!el) return;
    el.innerHTML = `<option value="">${defaultText}</option>`;
    options.forEach(v => el.add(new Option(v,v)));
  };

  updateSelect("batchFilter", batches, "All Batches");
  updateSelect("branchFilter", branches, "All Branches");
  updateSelect("companyFilter", companies, "All Companies");
  updateSelect("natureFilter", natures, "Nature of the Company");
  updateSelect("internFilter", interns, "Internship Type");
  updateSelect("genderFilter", genders, "All Genders");
}

function updateCompanyFilter(filteredData){
  let companySelect = document.getElementById("companyFilter");
  if(!companySelect) return;
  let currentValue = companySelect.value;
  let companies = [...new Set(filteredData.map(d => d["Company Placed"]).filter(Boolean))].sort();

  companySelect.innerHTML = '<option value="">All Companies</option>';
  companies.forEach(v => companySelect.add(new Option(v,v)));

  if(companies.includes(currentValue)){
    companySelect.value = currentValue;
  }
}

/* SAFEST DATE PARSER FUNCTION */
function parseCellDate(dateStr) {
  if (!dateStr) return null;
  let parts = dateStr.toString().trim().split(/[\.\-\/]/);
  if (parts.length === 3) {
    let day = parseInt(parts[0], 10);
    let month = parseInt(parts[1], 10) - 1; 
    let year = parseInt(parts[2], 10);
    if(year < 100) year += 2000; 
    let d = new Date(year, month, day);
    return isNaN(d.getTime()) ? null : d;
  }
  return null;
}

/* APPLY FILTERS */
function applyFilters(){
  let search=document.getElementById("search").value.toLowerCase();
  let batch=document.getElementById("batchFilter").value;
  let branch=document.getElementById("branchFilter").value;
  let company=document.getElementById("companyFilter").value;
  let nature=natureKey ? document.getElementById("natureFilter").value : "";
  let intern=internKey ? document.getElementById("internFilter").value : "";
  let gender=document.getElementById("genderFilter").value;

  let cStartVal = document.getElementById("campusStart").value;
  let cEndVal = document.getElementById("campusEnd").value;
  let rStartVal = document.getElementById("resultStart").value;
  let rEndVal = document.getElementById("resultEnd").value;

  let cStart = cStartVal ? new Date(cStartVal) : null;
  let cEnd = cEndVal ? new Date(cEndVal) : null;
  let rStart = rStartVal ? new Date(rStartVal) : null;
  let rEnd = rEndVal ? new Date(rEndVal) : null;

  if (cEnd) cEnd.setHours(23, 59, 59, 999);
  if (rEnd) rEnd.setHours(23, 59, 59, 999);

  let filtered=allData.filter(row=>{
    let text=JSON.stringify(row).toLowerCase();

    let cellCampusDate = campusDateKey ? parseCellDate(row[campusDateKey]) : null;
    let cellResultDate = resultDateKey ? parseCellDate(row[resultDateKey]) : null;

    let campusPass = true;
    if (cStart && (!cellCampusDate || cellCampusDate < cStart)) campusPass = false;
    if (cEnd && (!cellCampusDate || cellCampusDate > cEnd)) campusPass = false;

    let resultPass = true;
    if (rStart && (!cellResultDate || cellResultDate < rStart)) resultPass = false;
    if (rEnd && (!cellResultDate || cellResultDate > rEnd)) resultPass = false;

    return text.includes(search)
    && (batch==="" || row["Batch"]===batch)
    && (branch==="" || row["Branch"]===branch)
    && (company==="" || row["Company Placed"]===company)
    && (nature==="" || !natureKey || (row[natureKey] || "").trim()===nature)
    && (intern==="" || !internKey || (row[internKey] || "").trim()===intern)
    && (gender==="" || (row["Gender"] || "").trim()===gender)
    && campusPass
    && resultPass;
  });

  updateCompanyFilter(filtered);
  buildTable(filtered);
}

/* ATTACH LIVE LISTENERS */
document.getElementById("search").addEventListener("keyup",applyFilters);
document.getElementById("batchFilter").addEventListener("change",applyFilters);
document.getElementById("branchFilter").addEventListener("change",applyFilters);
document.getElementById("companyFilter").addEventListener("change",applyFilters);
document.getElementById("natureFilter").addEventListener("change",applyFilters);
document.getElementById("internFilter").addEventListener("change",applyFilters);
document.getElementById("genderFilter").addEventListener("change",applyFilters);

document.getElementById("campusStart").addEventListener("change",applyFilters);
document.getElementById("campusEnd").addEventListener("change",applyFilters);
document.getElementById("resultStart").addEventListener("change",applyFilters);
document.getElementById("resultEnd").addEventListener("change",applyFilters);

</script>

</body>
</html>
